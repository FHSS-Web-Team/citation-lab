<div class="page-head centered">
  <h1>Citation Template Lab</h1>
  <p class="muted">Build a test citation templates.</p>
</div>

<app-template-builder></app-template-builder>

<!-- Arguments -->
<section class="card">
  <div class="section-head">
    <div>
      <h2>Arguments</h2>
      <div class="muted">
        Arguments automatically sync and autofill from the Template Builder.
      </div>
    </div>
  </div>

  @if (arguments().length) {
    <div class="grid">
      @for (arg of arguments(); track $index; let idx = $index) {
        <div class="arg">
          <strong>{{ idx + 1 }}. {{ arg }}</strong>
          <input
            type="text"
            (input)="handleArgumentInput($event, idx)"
            [value]="values()[idx] ?? ''" />
        </div>
      }
    </div>
  } @else {
    <div class="empty-box muted">No arguments yet.</div>
  }

  <div class="result" [innerHTML]="renderCitation(result())"></div>
</section>
